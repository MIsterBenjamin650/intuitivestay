name: intuitive-stay

services:
  postgres:
    image: postgres
    container_name: intuitive-stay-postgres
    environment:
      POSTGRES_DB: intuitive-stay
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "6432:5432"
    volumes:
      - intuitive-stay_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  intuitive-stay_postgres_data:
